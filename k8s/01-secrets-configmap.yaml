# ── Secret: API Keys ─────────────────────────────────────────
# kubectl create secret generic rag-secrets \
#   --from-literal=OPENAI_API_KEY=sk-your-key \
#   -n rag-system
apiVersion: v1
kind: Secret
metadata:
  name: rag-secrets
  namespace: rag-system
type: Opaque
stringData:
  OPENAI_API_KEY: "REPLACE_WITH_YOUR_OPENAI_KEY"

---
# ── ConfigMap: App Configuration ─────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: rag-system
data:
  OPENAI_MODEL: "gpt-4o"
  EMBEDDING_MODEL: "text-embedding-3-small"
  CHROMA_HOST: "chromadb-service"
  CHROMA_PORT: "8000"
  CHROMA_COLLECTION: "multimodal_rag"
  REDIS_URL: "redis://redis-service:6379"
  CACHE_TTL: "3600"
  TOP_K_RETRIEVAL: "5"
  CHUNK_SIZE: "512"
  CHUNK_OVERLAP: "50"
  MAX_TOKENS: "2048"
  TEMPERATURE: "0.1"
  RAGAS_ENABLED: "true"
  DEBUG: "false"
  ALLOWED_ORIGINS: '["http://localhost","http://rag-frontend-service"]'
