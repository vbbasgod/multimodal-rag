# ── Frontend Deployment ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-frontend
  namespace: rag-system
  labels:
    app: rag-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: rag-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/multimodal-rag-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20

---
# ── Frontend Service ──────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: rag-frontend-service
  namespace: rag-system
spec:
  selector:
    app: rag-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
