version: "3.9"

services:
  # ── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: multimodal-rag-backend:latest
    container_name: rag-backend
    env_file: .env
    environment:
      CHROMA_HOST: chromadb
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rag-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    image: multimodal-rag-frontend:latest
    container_name: rag-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - rag-net
    restart: unless-stopped

  # ── ChromaDB ─────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.15
    container_name: rag-chromadb
    environment:
      ANONYMIZED_TELEMETRY: "false"
      CHROMA_SERVER_HOST: "0.0.0.0"
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - rag-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: rag-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rag-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chroma_data:
  redis_data:
  uploads_data:

networks:
  rag-net:
    driver: bridge
